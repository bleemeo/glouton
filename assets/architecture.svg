<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F8DF5"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="busFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F8DF5" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="busFlowOut" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-10%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B0F17" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- canvas background -->
  <rect x="0" y="0" width="1080" height="620" fill="#FAFBFC"/>

  <!-- column titles -->
  <text x="160" y="56" text-anchor="middle" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="2">SOURCES</text>
  <text x="920" y="56" text-anchor="middle" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="2">DESTINATIONS</text>

  <!-- ============================================================ -->
  <!-- connection lines (drawn first so cards overlap them cleanly) -->
  <!-- ============================================================ -->
  <g fill="none" stroke="#D1D5DB" stroke-width="1.5">
    <!-- left side: sources -> bus(x=340) -->
    <path d="M260,160 H320 Q340,160 340,180" />
    <path d="M260,220 H340" />
    <path d="M260,280 H340" />
    <path d="M260,340 H340" />
    <path d="M260,400 H340" />
    <path d="M260,460 H320 Q340,460 340,440" />
    <!-- left bus -->
    <line x1="340" y1="180" x2="340" y2="440"/>
  </g>
  <!-- left bus -> Glouton (thicker, gradient) -->
  <path d="M340,310 H440" fill="none" stroke="url(#busFlow)" stroke-width="3" stroke-linecap="round"/>

  <g fill="none" stroke="#D1D5DB" stroke-width="1.5">
    <!-- right side: bus(x=740) -> sinks -->
    <path d="M820,190 H760 Q740,190 740,210" />
    <path d="M820,250 H740" />
    <path d="M820,310 H740" />
    <path d="M820,370 H740" />
    <path d="M820,430 H760 Q740,430 740,410" />
    <!-- right bus -->
    <line x1="740" y1="210" x2="740" y2="410"/>
  </g>
  <!-- Glouton -> right bus -->
  <path d="M640,310 H740" fill="none" stroke="url(#busFlowOut)" stroke-width="3" stroke-linecap="round"/>

  <!-- ============================================================ -->
  <!-- SOURCES (left column) -->
  <!-- ============================================================ -->
  <g filter="url(#cardShadow)">
    <!-- Host metrics -->
    <rect x="60"  y="136" width="200" height="48" rx="8" fill="white" stroke="#E5E8EE"/>
    <rect x="60"  y="136" width="3"   height="48" rx="1.5" fill="#4F8DF5"/>
    <text x="80"  y="160" font-size="13" font-weight="600" fill="#111827">Host metrics</text>
    <text x="80"  y="176" font-size="10.5" fill="#6B7280">cpu · memory · disk · network</text>

    <!-- Container runtimes -->
    <rect x="60"  y="196" width="200" height="48" rx="8" fill="white" stroke="#E5E8EE"/>
    <rect x="60"  y="196" width="3"   height="48" rx="1.5" fill="#8B5CF6"/>
    <text x="80"  y="220" font-size="13" font-weight="600" fill="#111827">Container runtimes</text>
    <text x="80"  y="236" font-size="10.5" fill="#6B7280">Docker · containerd · Kubernetes</text>

    <!-- Discovered services -->
    <rect x="60"  y="256" width="200" height="48" rx="8" fill="white" stroke="#E5E8EE"/>
    <rect x="60"  y="256" width="3"   height="48" rx="1.5" fill="#10B981"/>
    <text x="80"  y="280" font-size="13" font-weight="600" fill="#111827">Discovered services</text>
    <text x="80"  y="296" font-size="10.5" fill="#6B7280">nginx · postgres · redis · 30+ more</text>

    <!-- Probes & checks -->
    <rect x="60"  y="316" width="200" height="48" rx="8" fill="white" stroke="#E5E8EE"/>
    <rect x="60"  y="316" width="3"   height="48" rx="1.5" fill="#F59E0B"/>
    <text x="80"  y="340" font-size="13" font-weight="600" fill="#111827">Probes &amp; checks</text>
    <text x="80"  y="356" font-size="10.5" fill="#6B7280">HTTP · TCP · NRPE · Nagios</text>

    <!-- SNMP -->
    <rect x="60"  y="376" width="200" height="48" rx="8" fill="white" stroke="#E5E8EE"/>
    <rect x="60"  y="376" width="3"   height="48" rx="1.5" fill="#06B6D4"/>
    <text x="80"  y="400" font-size="13" font-weight="600" fill="#111827">SNMP</text>
    <text x="80"  y="416" font-size="10.5" fill="#6B7280">network gear · printers · UPS</text>

    <!-- JMX / StatsD -->
    <rect x="60"  y="436" width="200" height="48" rx="8" fill="white" stroke="#E5E8EE"/>
    <rect x="60"  y="436" width="3"   height="48" rx="1.5" fill="#EC4899"/>
    <text x="80"  y="460" font-size="13" font-weight="600" fill="#111827">JMX &amp; StatsD</text>
    <text x="80"  y="476" font-size="10.5" fill="#6B7280">java apps · custom metrics</text>
  </g>

  <!-- ============================================================ -->
  <!-- GLOUTON center card -->
  <!-- ============================================================ -->
  <g filter="url(#cardShadow)">
    <rect x="440" y="220" width="200" height="180" rx="16" fill="white" stroke="url(#accent)" stroke-width="2.5"/>
    <rect x="440" y="220" width="200" height="6" rx="3" fill="url(#accent)"/>
  </g>
  <text x="540" y="290" text-anchor="middle" font-size="24" font-weight="800" fill="#111827" letter-spacing="3">GLOUTON</text>
  <text x="540" y="318" text-anchor="middle" font-size="12" fill="#6B7280">monitoring agent</text>
  <!-- decorative pulse bars (mimicking metrics) -->
  <g fill="none" stroke-linecap="round" stroke-width="2">
    <path d="M468,355 L484,355 L496,345 L508,365 L520,350 L532,358 L552,358 L564,344 L576,360 L588,352 L612,352" stroke="#4F8DF5" opacity="0.5"/>
    <path d="M468,375 L488,375 L500,365 L516,378 L530,370 L548,373 L566,365 L580,378 L612,378" stroke="#8B5CF6" opacity="0.5"/>
  </g>

  <!-- ============================================================ -->
  <!-- DESTINATIONS (right column) -->
  <!-- ============================================================ -->
  <g filter="url(#cardShadow)">
    <!-- Local web panel -->
    <rect x="820" y="166" width="200" height="48" rx="8" fill="white" stroke="#E5E8EE"/>
    <rect x="820" y="166" width="3"   height="48" rx="1.5" fill="#4F8DF5"/>
    <text x="840" y="190" font-size="13" font-weight="600" fill="#111827">Local web panel</text>
    <text x="840" y="206" font-size="10.5" fill="#6B7280">http://&lt;host&gt;:8015</text>

    <!-- Prometheus endpoint -->
    <rect x="820" y="226" width="200" height="48" rx="8" fill="white" stroke="#E5E8EE"/>
    <rect x="820" y="226" width="3"   height="48" rx="1.5" fill="#8B5CF6"/>
    <text x="840" y="250" font-size="13" font-weight="600" fill="#111827">Prometheus endpoint</text>
    <text x="840" y="266" font-size="10.5" fill="#6B7280">/metrics · /api/v1/query_range</text>

    <!-- Local TSDB (highlighted, the new feature) -->
    <rect x="820" y="286" width="200" height="48" rx="8" fill="white" stroke="#E5E8EE"/>
    <rect x="820" y="286" width="3"   height="48" rx="1.5" fill="url(#accent)"/>
    <text x="840" y="310" font-size="13" font-weight="600" fill="#111827">Local TSDB</text>
    <text x="840" y="326" font-size="10.5" fill="#6B7280">on-disk · 15d default retention</text>

    <!-- Bleemeo Cloud -->
    <rect x="820" y="346" width="200" height="48" rx="8" fill="white" stroke="#E5E8EE"/>
    <rect x="820" y="346" width="3"   height="48" rx="1.5" fill="#10B981"/>
    <text x="840" y="370" font-size="13" font-weight="600" fill="#111827">Bleemeo Cloud</text>
    <text x="840" y="386" font-size="10.5" fill="#6B7280">SaaS · long-term storage · alerts</text>

    <!-- MQTT -->
    <rect x="820" y="406" width="200" height="48" rx="8" fill="white" stroke="#E5E8EE"/>
    <rect x="820" y="406" width="3"   height="48" rx="1.5" fill="#F97316"/>
    <text x="840" y="430" font-size="13" font-weight="600" fill="#111827">MQTT broker</text>
    <text x="840" y="446" font-size="10.5" fill="#6B7280">push to your own pipeline</text>
  </g>

  <!-- ============================================================ -->
  <!-- footnote -->
  <!-- ============================================================ -->
  <text x="540" y="580" text-anchor="middle" font-size="11" fill="#9CA3AF">
    A single binary. Auto-discovery. Standalone or paired with Bleemeo Cloud.
  </text>
</svg>
